          - heading "Spring Dresses with Jackets" [level=1] [ref=e18]
          - generic [ref=e19]: "The spring dress-and-jacket combination is Julia's single most-reached-for formula. It solves the fundamental spring problem: mornings are cold, afternoons are warm, and you need to look good through both. The trick isn't matching — it's contrast. A structured blazer over a flowing floral dress. A cropped denim jacket over a midi. A lightweight trench left open over something bright underneath. The jacket does the work of making it \"an outfit\" instead of \"just a dress.\" These pairings come from years of Julia's Daily Looks. Some are obvious (the classic trench + wrap dress), and some are unexpected (a leather jacket over a garden print). Every combination is one you can recreate with pieces you probably already own — and the ones you don't are all linked to shop."
